<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg:        #141417;
            --surface:   #1c1c21;
            --surface2:  #242429;
            --surface3:  #2c2c33;
            --border:    #2e2e38;
            --text:      #e8e8f0;
            --muted:     #7a7a94;
            --accent:    #00c2ff;
            --accent-glow: rgba(0,194,255,0.18);
            --accent-dim:  rgba(0,194,255,0.08);
            --green:     #00e5a0;
            --yellow:    #ffc845;
            --red:       #ff5063;
            --orange:    #ff8c42;
            --radius:    8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .logo-icon svg { width: 14px; height: 14px; fill: var(--accent); }

        .logo-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .logo-text span { color: var(--accent); }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,229,160,0.08);
            border: 1px solid rgba(0,229,160,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── MAIN LAYOUT ── */
        .main {
            display: grid;
            grid-template-columns: 420px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        .left {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 22px 14px;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .left-body {
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            overflow-y: auto;
        }

        textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            line-height: 1.6;
            resize: none;
            height: 120px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        textarea::placeholder { color: var(--muted); }

        .send-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .send-btn:hover {
            box-shadow: 0 0 30px rgba(0,194,255,0.4);
            transform: translateY(-1px);
        }

        .send-btn:active { transform: translateY(0); }

        .send-btn:disabled {
            background: var(--surface3);
            color: var(--muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .response-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .response-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            font-size: 13px;
            line-height: 1.7;
            color: #c8c8d8;
            flex: 1;
            overflow-y: auto;
            min-height: 120px;
            max-height: 260px;
        }

        .response-box.empty { color: var(--muted); font-style: italic; }

        .meta-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .badge-latency { background: rgba(0,194,255,0.08); border-color: rgba(0,194,255,0.2); color: var(--accent); }
        .badge-excellent { background: rgba(0,229,160,0.08); border-color: rgba(0,229,160,0.2); color: var(--green); }
        .badge-good { background: rgba(0,229,160,0.05); border-color: rgba(0,229,160,0.15); color: #7de8c0; }
        .badge-okay { background: rgba(255,200,69,0.08); border-color: rgba(255,200,69,0.2); color: var(--yellow); }
        .badge-poor { background: rgba(255,80,99,0.08); border-color: rgba(255,80,99,0.2); color: var(--red); }

        /* ── RIGHT PANEL ── */
        .right {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .right-header {
            padding: 18px 24px 14px;
            border-bottom: 1px solid var(--border);
        }

        .right-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ── METRIC CARDS ── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .metric-card:hover { border-color: var(--accent); }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            opacity: 0.6;
        }

        .metric-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .metric-value.accent { color: var(--accent); }
        .metric-value.green { color: var(--green); }
        .metric-value.yellow { color: var(--yellow); }

        .metric-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ── CHART ── */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
        }

        .chart-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        /* ── LOGS TABLE ── */
        .logs-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            flex: 1;
        }

        .logs-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: var(--surface2);
            padding: 10px 18px;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 10px 18px;
            font-size: 12.5px;
            color: #b0b0c8;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tbody tr:hover td { background: var(--surface2); }
        tbody tr:last-child td { border-bottom: none; }

        .prompt-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.5px;
            color: var(--text);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 16 16"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z"/></svg>
        </div>
        <span class="logo-text">LLM<span>.</span>Monitor</span>
    </div>
    <div class="status-pill">
        <div class="status-dot"></div>
        Pipeline Active
    </div>
</header>

<!-- MAIN -->
<div class="main">

    <!-- LEFT: QUERY PANEL -->
    <div class="left">
        <div class="panel-header">
            <div class="panel-title">Query Interface</div>
        </div>
        <div class="left-body">
            <textarea id="prompt" placeholder="Enter your prompt here..."></textarea>

            <button class="send-btn" id="sendBtn" onclick="sendPrompt()">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Send to LLM</span>
            </button>

            <div class="divider"></div>

            <div class="response-label">Last Response</div>
            <div class="response-box empty" id="response">Waiting for first query...</div>
            <div class="meta-row" id="meta"></div>
        </div>
    </div>

    <!-- RIGHT: METRICS PANEL -->
    <div class="right">
        <div class="right-header">
            <div class="panel-title">Live Metrics & Logs</div>
        </div>
        <div class="right-body">

            <!-- METRIC CARDS -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Queries</div>
                    <div class="metric-value accent" id="totalQueries">—</div>
                    <div class="metric-sub">all time</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Avg Latency</div>
                    <div class="metric-value" id="avgLatency">—</div>
                    <div class="metric-sub">milliseconds</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Avg Quality</div>
                    <div class="metric-value green" id="avgQuality">—</div>
                    <div class="metric-sub" id="avgQualityLabel">score / rating</div>
                </div>
            </div>

            <!-- CHART -->
            <div class="chart-card">
                <div class="chart-title">Quality Score Over Time</div>
                <canvas id="chart" height="90"></canvas>
            </div>

            <!-- LOGS -->
            <div class="logs-card">
                <div class="logs-header">Recent Logs</div>
                <table>
                    <thead>
                        <tr>
                            <th>Prompt</th>
                            <th>Model</th>
                            <th>Latency</th>
                            <th>Quality</th>
                        </tr>
                    </thead>
                    <tbody id="logs">
                        <tr><td colspan="4" class="empty-state">No queries yet — send your first prompt</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
    let chart = null;

    function qualityInfo(score) {
        if (score >= 1.0) return { label: 'Excellent', cls: 'badge-excellent', color: '#00e5a0', valueClass: 'green' };
        if (score >= 0.9) return { label: 'Good',      cls: 'badge-good',      color: '#7de8c0', valueClass: 'green' };
        if (score >= 0.6) return { label: 'Okay',      cls: 'badge-okay',      color: '#ffc845', valueClass: 'yellow' };
        return                   { label: 'Poor',      cls: 'badge-poor',      color: '#ff5063', valueClass: '' };
    }

    async function sendPrompt() {
        const prompt = document.getElementById('prompt').value.trim();
        if (!prompt) return;

        const btn = document.getElementById('sendBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const responseBox = document.getElementById('response');

        btn.disabled = true;
        spinner.style.display = 'inline-block';
        btnText.innerText = 'Sending...';
        responseBox.classList.add('empty');
        responseBox.innerText = 'Waiting for response...';
        document.getElementById('meta').innerHTML = '';

        try {
            const form = new FormData();
            form.append('prompt', prompt);
            const res = await fetch('/query', { method: 'POST', body: form });
            const data = await res.json();

            responseBox.classList.remove('empty');
            responseBox.innerText = data.response;

            const q = qualityInfo(data.quality_score);
            document.getElementById('meta').innerHTML = `
                <span class="badge badge-latency">⚡ ${data.latency_ms}ms</span>
                <span class="badge ${q.cls}">★ ${q.label} (${data.quality_score.toFixed(1)})</span>
            `;

            loadLogs();
        } catch (e) {
            responseBox.innerText = 'Error: ' + e.message;
        }

        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.innerText = 'Send to LLM';
    }

    async function loadLogs() {
        try {
            const res = await fetch('/logs');
            const logs = await res.json();
            if (!logs.length) return;

            const avgLatency = Math.round(logs.reduce((s, l) => s + (l.latency_ms || 0), 0) / logs.length);
            const avgScore = logs.reduce((s, l) => s + (l.quality_score || 0), 0) / logs.length;
            const q = qualityInfo(avgScore);

            document.getElementById('totalQueries').innerText = logs.length;
            document.getElementById('avgLatency').innerText = avgLatency + 'ms';
            document.getElementById('avgQuality').innerText = avgScore.toFixed(2);
            document.getElementById('avgQuality').className = 'metric-value ' + q.valueClass;
            document.getElementById('avgQualityLabel').innerText = q.label;

            // Table
            document.getElementById('logs').innerHTML = logs.map(l => {
                const q = qualityInfo(l.quality_score || 0);
                return `<tr>
                    <td class="prompt-cell">${(l.prompt || '').substring(0, 45)}${l.prompt && l.prompt.length > 45 ? '...' : ''}</td>
                    <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">llama-3.1</td>
                    <td style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--accent)">${l.latency_ms || '—'}ms</td>
                    <td><span class="badge ${q.cls}">★ ${q.label} (${(l.quality_score||0).toFixed(1)})</span></td>
                </tr>`;
            }).join('');

            // Chart
            const reversed = [...logs].reverse();
            const labels = reversed.map((_, i) => `Q${i + 1}`);
            const scores = reversed.map(l => l.quality_score || 0);

            if (chart) chart.destroy();
            const ctx = document.getElementById('chart').getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, 150);
            grad.addColorStop(0, 'rgba(0,194,255,0.3)');
            grad.addColorStop(1, 'rgba(0,194,255,0)');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: scores,
                        borderColor: '#00c2ff',
                        backgroundColor: grad,
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#00c2ff',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            min: 0, max: 1.1,
                            ticks: { color: '#7a7a94', font: { family: 'JetBrains Mono', size: 10 } },
                            grid: { color: '#2e2e38' }
                        },
                        x: {
                            ticks: { color: '#7a7a94', font: { family: 'JetBrains Mono', size: 10 } },
                            grid: { color: '#2e2e38' }
                        }
                    }
                }
            });

        } catch (e) {
            console.error(e);
        }
    }

    // Enter key to send
    document.getElementById('prompt').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.ctrlKey) sendPrompt();
    });

    loadLogs();
</script>
</body>
</html>
